services:
  mysql:
    image: mysql:8.4
    container_name: fiscalia_landing_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fiscalia_landing}
      MYSQL_USER: ${MYSQL_USER:-fiscalia}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-fiscalia_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-fiscalia}", "-p${MYSQL_PASSWORD:-fiscalia_password}"]
      interval: 10s
      timeout: 5s
      retries: 8

  web:
    build: .
    container_name: fiscalia_landing_web
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # FORZAR la URL correcta para la base de datos
      DATABASE_URL: "mysql://fiscalia:fiscalia_password@mysql:3306/fiscalia_landing"
    command: sh -c "npx prisma generate && npx prisma db push && npm run dev"

volumes:
  mysql_data: